name: Update profile art

on:
  schedule:
    - cron: "17 3 * * *"   # ~03:17 UTC daily — pick any time, just avoid the top of the hour
  workflow_dispatch: {}     # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch contributions
        env:
          GH_PROFILE_USER: iamSahil-dev
        run: python scripts/fetch_contributions.py

      - name: Render heatmap
        run: python scripts/render_heatmap_svg.py

      - name: Fetch top languages
        env:
          GH_PROFILE_USER: iamSahil-dev
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/fetch_languages.py

      - name: Render languages bar
        run: python scripts/render_langs_svg.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/contributions.json contrib-heatmap.svg data/languages.json langs.svg
          git diff --staged --quiet || git commit -m "chore: refresh contribution graph + language stats"
          git push
