    from {
        transform: scaleX(0);
    }
    to {
        transform: scaleX(1);
    }
}

@keyframes fade {
    from {
        opacity:0;
        transform:translateX(-8px);
    }
    to {
        opacity:1;
        transform:translateX(0);
    }
}

@keyframes breathe {
    0% {
        opacity:1;
    }
    50% {
        opacity:.75;
    }
    100% {
        opacity:1;
    }
}

.bar {
    transform-origin:left;
    animation:
        grow 0.90s cubic-bezier(.2,.8,.2,1) both;
}

.label {
    opacity:0;
    animation:fade .5s ease forwards;
}

.live {
    animation:breathe 2s ease-in-out infinite;
